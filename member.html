  <script>
    async function loadMember() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) {
        document.getElementById('member-name').textContent = 'Member not found';
        return;
      }

      let member;
      try {
        const res = await fetch('data/members/' + id + '.json');
        if (!res.ok) throw new Error('Not found');
        member = await res.json();
      } catch (e) {
        document.getElementById('member-name').textContent = 'Member not found';
        return;
      }

      // Update page title
      document.title = member.name + ' - MIT Bioelectronics Group';
      document.getElementById('member-name').textContent = member.name;

      // Build role line
      const role = member.role || (member.roles && member.roles.join(', ')) || '';
      const dept = member.department ? `<span style="display:block;color:#555;">${member.department}</span>` : '';

      // Photo
      const photo = member.photo
        ? `<div class="pic" style="max-width:280px;margin-bottom:20px;">
             <img src="${member.photo}" class="img-fluid" alt="${member.name}"
                  onerror="this.parentElement.style.display='none'">
           </div>`
        : '';

      // Education
      let eduHTML = '';
      if (member.education && member.education.length) {
        const items = member.education.map(e => {
          const yr = e.year ? ` (${e.year})` : '';
          return `<li>${e.degree} in ${e.field}, ${e.institution}${yr}</li>`;
        }).join('');
        eduHTML = `<h5 style="margin-top:24px;margin-bottom:8px;">Education</h5><ul style="padding-left:20px;">${items}</ul>`;
      }

      // Interests
      let interestsHTML = '';
      if (member.interests && member.interests.length) {
        interestsHTML = `<h5 style="margin-top:24px;margin-bottom:8px;">Research Interests</h5>
          <p>${member.interests.join(' &middot; ')}</p>`;
      }

      // Bio
      const bioHTML = member.bio
        ? `<h5 style="margin-top:24px;margin-bottom:8px;">Biography</h5><p>${member.bio}</p>`
        : '';

      // Email
      const emailHTML = member.email
        ? `<p style="margin-top:16px;"><i class="bi bi-envelope"></i> <a href="mailto:${member.email}">${member.email}</a></p>`
        : '';

      // Social links
      const socialLinks = [];
      if (member.scholar) socialLinks.push(`<a href="${member.scholar}" target="_blank" title="Google Scholar"><i class="bi bi-mortarboard-fill"></i></a>`);
      if (member.linkedin) socialLinks.push(`<a href="${member.linkedin}" target="_blank" title="LinkedIn"><i class="bi bi-linkedin"></i></a>`);
      if (member.instagram) socialLinks.push(`<a href="${member.instagram}" target="_blank" title="Instagram"><i class="bi bi-instagram"></i></a>`);
      if (member.twitter) socialLinks.push(`<a href="${member.twitter}" target="_blank" title="Twitter/X"><i class="bi bi-twitter-x"></i></a>`);
      const socialHTML = socialLinks.length
        ? `<p style="margin-top:8px;font-size:1.3rem;display:flex;gap:12px;align-items:center;">${socialLinks.join('')}</p>`
        : '';

      document.getElementById('member-content').innerHTML = `
        <div class="row no-gutters">
          <div class="col-md-4" data-aos="fade-up">${photo}</div>
          <div class="col-md-8" data-aos="fade-up" data-aos-delay="100" style="padding: 0 20px;">
            <h4 style="margin-bottom:4px;">${role}</h4>
            ${dept}
            ${emailHTML}
            ${socialHTML}
            ${interestsHTML}
            ${eduHTML}
            ${bioHTML}
          </div>
        </div>`;

      if (typeof AOS !== 'undefined') AOS.refresh();
    }

    document.addEventListener('DOMContentLoaded', loadMember);
  </script>
