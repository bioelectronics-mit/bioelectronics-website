  <script>
    async function loadNewsItem() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const titleEl   = document.getElementById('news-title');
      const contentEl = document.getElementById('news-content');

      if (!id) {
        titleEl.textContent = 'News item not found';
        contentEl.innerHTML = '';
        return;
      }

      let item;
      try {
        const res = await fetch('data/news/' + id + '.json');
        if (!res.ok) throw new Error('Not found');
        item = await res.json();
      } catch (e) {
        titleEl.textContent = 'News item not found';
        contentEl.innerHTML = '<p>Could not load this news item.</p>';
        return;
      }

      document.title = item.title + ' - MIT Bioelectronics Group';
      titleEl.textContent = item.title;

      // Date
      const dateHTML = `<p style="color:#888;margin-bottom:20px;">${item.date}</p>`;

      // Featured image: explicit → auto jpg → auto png → none
      const slug = id;
      const imgStyle = 'max-width:100%;height:auto;border-radius:4px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.12);';
      let imgHTML = '';
      if (item.image) {
        imgHTML = `<div><img src="${item.image}" style="${imgStyle}" alt="" onerror="this.parentElement.style.display='none'"></div>`;
      } else {
        imgHTML = `<div><img src="data/news/images/${slug}.jpg" style="${imgStyle}" alt=""
          onerror="if(this.src.includes('.jpg')){this.src='data/news/images/${slug}.png'}else{this.parentElement.style.display='none'}"></div>`;
      }

      // Body
      const bodyHTML = item.body
        ? `<div style="line-height:1.8;">${item.body}</div>`
        : '';

      contentEl.innerHTML = dateHTML + imgHTML + bodyHTML;
    }

    document.addEventListener('DOMContentLoaded', loadNewsItem);
  </script>
